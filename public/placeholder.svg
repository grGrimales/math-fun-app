<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fdf2f8"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="circle1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="circle2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="240" fill="url(#bg)"/>

  <!-- Decorative blobs -->
  <circle cx="340" cy="30" r="60" fill="#f9a8d4" opacity="0.25"/>
  <circle cx="60" cy="200" r="70" fill="#93c5fd" opacity="0.2"/>
  <circle cx="200" cy="120" r="90" fill="#e9d5ff" opacity="0.3"/>

  <!-- Floating math symbols -->
  <!-- Top-left: + -->
  <text x="28" y="58" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="38" font-weight="900" fill="#f472b6" opacity="0.55">+</text>

  <!-- Top-right: × -->
  <text x="338" y="70" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="34" font-weight="900" fill="#818cf8" opacity="0.55">×</text>

  <!-- Bottom-left: ÷ -->
  <text x="22" y="195" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="34" font-weight="900" fill="#60a5fa" opacity="0.55">÷</text>

  <!-- Bottom-right: − -->
  <text x="346" y="200" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="44" font-weight="900" fill="#c084fc" opacity="0.55">−</text>

  <!-- Small floating numbers -->
  <text x="80" y="42" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="18" font-weight="700" fill="#f9a8d4" opacity="0.6">7</text>
  <text x="300" y="38" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="16" font-weight="700" fill="#a5b4fc" opacity="0.6">3</text>
  <text x="355" y="145" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="20" font-weight="700" fill="#f472b6" opacity="0.5">9</text>
  <text x="18" y="135" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="16" font-weight="700" fill="#818cf8" opacity="0.5">5</text>
  <text x="168" y="36" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="14" font-weight="700" fill="#c084fc" opacity="0.5">12</text>
  <text x="220" y="218" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="14" font-weight="700" fill="#60a5fa" opacity="0.5">8</text>
  <text x="120" y="215" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="16" font-weight="700" fill="#f472b6" opacity="0.45">4</text>
  <text x="310" y="215" font-family="Arial Rounded MT Bold, Arial, sans-serif" font-size="14" font-weight="700" fill="#a78bfa" opacity="0.45">6</text>

  <!-- Center icon bubble -->
  <circle cx="200" cy="112" r="46" fill="white" opacity="0.85"/>
  <circle cx="200" cy="112" r="46" stroke="#f9a8d4" stroke-width="2.5" fill="none"/>

  <!-- ∑ symbol in center -->
  <text x="200" y="130" text-anchor="middle" font-family="Georgia, serif" font-size="48" font-weight="900" fill="url(#circle1)">∑</text>

  <!-- Stars -->
  <text x="148" y="70" font-size="14" opacity="0.55">⭐</text>
  <text x="236" y="65" font-size="12" opacity="0.45">✨</text>
  <text x="96" y="168" font-size="12" opacity="0.4">⭐</text>
  <text x="285" y="172" font-size="13" opacity="0.45">✨</text>
</svg>
